<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#93C5FD" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- soft blobs -->
  <circle cx="330" cy="260" r="220" fill="url(#g1)" filter="url(#blur)"/>
  <circle cx="860" cy="320" r="260" fill="url(#g2)" filter="url(#blur)"/>
  <circle cx="720" cy="690" r="260" fill="url(#g1)" filter="url(#blur)"/>

  <!-- grid lines -->
  <g opacity="0.15">
    <path d="M120 140H1080" stroke="#DBEAFE" stroke-width="2"/>
    <path d="M120 240H1080" stroke="#DBEAFE" stroke-width="2"/>
    <path d="M120 340H1080" stroke="#DBEAFE" stroke-width="2"/>
    <path d="M120 440H1080" stroke="#DBEAFE" stroke-width="2"/>
    <path d="M120 540H1080" stroke="#DBEAFE" stroke-width="2"/>
    <path d="M120 640H1080" stroke="#DBEAFE" stroke-width="2"/>
    <path d="M120 740H1080" stroke="#DBEAFE" stroke-width="2"/>
  </g>

  <!-- simple UI card -->
  <g opacity="0.95">
    <rect x="640" y="190" width="420" height="270" rx="24" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
    <rect x="680" y="235" width="250" height="16" rx="8" fill="rgba(255,255,255,0.55)"/>
    <rect x="680" y="270" width="320" height="12" rx="6" fill="rgba(255,255,255,0.30)"/>
    <rect x="680" y="295" width="290" height="12" rx="6" fill="rgba(255,255,255,0.25)"/>
    <rect x="680" y="345" width="150" height="40" rx="14" fill="rgba(37,99,235,0.65)"/>
    <rect x="845" y="345" width="150" height="40" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.18)"/>
  </g>

  <!-- chart -->
  <g opacity="0.85">
    <rect x="160" y="520" width="420" height="240" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
    <path d="M210 710V585" stroke="rgba(147,197,253,0.7)" stroke-width="22" stroke-linecap="round"/>
    <path d="M290 710V560" stroke="rgba(96,165,250,0.8)" stroke-width="22" stroke-linecap="round"/>
    <path d="M370 710V610" stroke="rgba(59,130,246,0.85)" stroke-width="22" stroke-linecap="round"/>
    <path d="M450 710V545" stroke="rgba(37,99,235,0.9)" stroke-width="22" stroke-linecap="round"/>
  </g>
</svg>


