<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .spinning { animation: spin 8s linear infinite; transform-origin: 100px 100px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff" rx="40"/>
  
  <!-- Border circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Eye design (concentric circles) -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#1e3a8a" stroke-width="5" class="spinning"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#1e3a8a" stroke-width="5" class="spinning" style="animation-direction: reverse; animation-delay: 1s;"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#1e3a8a" stroke-width="4"/>
  <circle cx="100" cy="100" r="25" fill="#1e3a8a"/>
  
  <!-- Highlight -->
  <circle cx="92" cy="92" r="8" fill="#3b82f6" opacity="0.8"/>
</svg>