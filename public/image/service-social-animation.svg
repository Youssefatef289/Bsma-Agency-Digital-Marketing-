<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
      @keyframes swing { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
      .bouncing { animation: bounce 1.5s ease-in-out infinite; }
      .swinging { animation: swing 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <circle cx="150" cy="150" r="145" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Social media icons -->
  <g class="bouncing">
    <!-- Like icon -->
    <path d="M130 120 Q125 110 120 110 Q115 110 115 115 Q115 120 120 125 L135 140 Z" fill="#10b981"/>
    <circle cx="145" cy="130" r="8" fill="#10b981" class="swinging"/>
    <circle cx="160" cy="135" r="8" fill="#059669" class="swinging" style="animation-delay: 0.3s;"/>
  </g>
  
  <!-- Speech bubbles -->
  <g class="swinging" style="animation-delay: 0.5s;">
    <rect x="100" y="160" width="50" height="40" rx="8" fill="#34d399" opacity="0.7"/>
    <polygon points="105,200 100,210 110,205" fill="#34d399"/>
  </g>
  
  <!-- Share icon -->
  <g class="bouncing" style="animation-delay: 0.3s;">
    <circle cx="180" cy="110" r="6" fill="#10b981"/>
    <circle cx="170" cy="145" r="6" fill="#10b981"/>
    <circle cx="190" cy="145" r="6" fill="#10b981"/>
    <line x1="180" y1="116" x2="170" y2="139" stroke="#10b981" stroke-width="1.5"/>
    <line x1="180" y1="116" x2="190" y2="139" stroke="#10b981" stroke-width="1.5"/>
  </g>
  
  <!-- Center badge -->
  <circle cx="150" cy="230" r="30" fill="#059669"/>
  <text x="150" y="240" text-anchor="middle" font-size="18" font-weight="bold" fill="white">SM</text>
</svg>