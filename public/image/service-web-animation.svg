<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <style>
      @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes glow { 0%, 100% { r: 25; opacity: 1; } 50% { r: 35; opacity: 0.5; } }
      .orbiting { animation: orbit 8s linear infinite; transform-origin: 150px 150px; }
      .glowing { animation: glow 2s ease-in-out infinite; }
      @keyframes pulse-globe { 0%, 100% { stroke-width: 2; } 50% { stroke-width: 3; } }
      .pulse-globe { animation: pulse-globe 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <circle cx="150" cy="150" r="145" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Globe -->
  <circle cx="150" cy="150" r="50" fill="none" stroke="#3b82f6" stroke-width="2" class="pulse-globe"/>
  <ellipse cx="150" cy="150" rx="40" ry="15" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Continents (simplified) -->
  <g fill="#3b82f6" opacity="0.3">
    <path d="M160 140 L170 145 L165 155 L155 150 Z"/>
    <path d="M130 160 L140 165 L135 175 L125 170 Z"/>
  </g>
  
  <!-- Orbiting satellites -->
  <g class="orbiting">
    <circle cx="150" cy="80" r="8" fill="#1e40af"/>
    <circle cx="220" cy="150" r="8" fill="#1e40af"/>
    <circle cx="150" cy="220" r="8" fill="#1e40af"/>
    <circle cx="80" cy="150" r="8" fill="#1e40af"/>
  </g>
  
  <!-- Glowing center -->
  <circle cx="150" cy="150" r="25" fill="#60a5fa" class="glowing"/>
  
  <!-- Code brackets -->
  <text x="120" y="160" font-size="16" fill="#1e40af" font-weight="bold">&lt;</text>
  <text x="165" y="160" font-size="16" fill="#1e40af" font-weight="bold">&gt;</text>
  
  <!-- Center badge -->
  <circle cx="150" cy="270" r="25" fill="#1e40af"/>
  <text x="150" y="277" text-anchor="middle" font-size="16" font-weight="bold" fill="white">WEB</text>
</svg>