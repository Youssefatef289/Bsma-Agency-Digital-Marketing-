<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <style>
      @keyframes play-pause { 0%, 100% { r: 30; } 50% { r: 35; } }
      @keyframes bars { 0%, 100% { height: 40; } 25% { height: 60; } 50% { height: 80; } 75% { height: 50; } }
      .play-icon { animation: play-pause 2s ease-in-out infinite; }
      .bar1 { animation: bars 1.5s ease-in-out infinite; }
      .bar2 { animation: bars 1.5s ease-in-out infinite 0.2s; }
      .bar3 { animation: bars 1.5s ease-in-out infinite 0.4s; }
      @keyframes slide { 0% { transform: translateX(-100px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
      .sliding { animation: slide 1s ease-out forwards; }
    </style>
  </defs>
  
  <!-- Background -->
  <circle cx="150" cy="150" r="145" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Play button -->
  <circle cx="150" cy="110" r="30" fill="#f97316" class="play-icon"/>
  <polygon points="140,100 140,120 160,110" fill="white"/>
  
  <!-- Audio bars -->
  <g class="sliding">
    <rect x="125" y="155" width="8" height="60" fill="#f97316" rx="4" class="bar1"/>
    <rect x="146" y="145" width="8" height="80" fill="#fb923c" rx="4" class="bar2"/>
    <rect x="167" y="155" width="8" height="60" fill="#f97316" rx="4" class="bar3"/>
  </g>
  
  <!-- Film strip -->
  <rect x="100" y="230" width="100" height="40" rx="4" fill="#fed7aa" opacity="0.5"/>
  <rect x="105" y="235" width="12" height="30" fill="#fb923c"/>
  <rect x="125" y="235" width="12" height="30" fill="#fb923c"/>
  <rect x="145" y="235" width="12" height="30" fill="#fb923c"/>
  <rect x="165" y="235" width="12" height="30" fill="#fb923c"/>
  <rect x="185" y="235" width="12" height="30" fill="#fb923c"/>
  
  <!-- Center badge -->
  <circle cx="150" cy="280" r="25" fill="#ea580c"/>
  <text x="150" y="287" text-anchor="middle" font-size="16" font-weight="bold" fill="white">VD</text>
</svg>