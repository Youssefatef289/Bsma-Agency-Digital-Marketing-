<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .floating { animation: float 3s ease-in-out infinite; }
      .pulsing { animation: pulse 2s ease-in-out infinite; }
      .spinning { animation: rotate 8s linear infinite; }
    </style>
  </defs>
  
  <!-- Background circles -->
  <circle cx="300" cy="200" r="150" fill="#e0e7ff" class="pulsing"/>
  <circle cx="300" cy="200" r="120" fill="#c7d2fe" class="pulsing" style="animation-delay: 0.5s;"/>
  
  <!-- Center floating icon -->
  <g class="floating">
    <circle cx="300" cy="200" r="80" fill="#4f46e5" opacity="0.1"/>
    <rect x="240" y="140" width="120" height="120" fill="#4f46e5" rx="20"/>
    
    <!-- Floating circles -->
    <circle cx="180" cy="160" r="15" fill="#818cf8" class="spinning"/>
    <circle cx="420" cy="160" r="15" fill="#818cf8" class="spinning" style="animation-direction: reverse;"/>
    <circle cx="180" cy="240" r="15" fill="#818cf8" class="spinning" style="animation-delay: 2s;"/>
    <circle cx="420" cy="240" r="15" fill="#818cf8" class="spinning" style="animation-delay: 2s; animation-direction: reverse;"/>
  </g>
  
  <!-- Decorative lines -->
  <line x1="50" y1="200" x2="150" y2="200" stroke="#818cf8" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="450" y1="200" x2="550" y2="200" stroke="#818cf8" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="300" y1="50" x2="300" y2="150" stroke="#818cf8" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="300" y1="250" x2="300" y2="350" stroke="#818cf8" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
</svg>